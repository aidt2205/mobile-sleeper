<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            transition-timing-function: cubic-bezier(0.33, 1, 0.68, 1);
        }

        .sleep-overlay {
            background: radial-gradient(circle at center, rgba(18, 19, 25, 0) 0%, rgba(13, 14, 20, 1) 100%);
        }
        .glow-soft {
            filter: blur(80px);
            opacity: 0.03;

    body {

<body class="bg-surface text-on-surface font-body selection:bg-primary/30">
<!-- Sleep Canvas: Full Screen Focal Point -->
<main class="relative min-h-screen w-full flex flex-col items-center justify-center overflow-hidden bg-surface-container-lowest">
<!-- Subtle Ambient Background Element -->
<div class="absolute inset-0 z-0">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary rounded-full glow-soft"></div>
<div class="absolute inset-0 sleep-overlay"></div>
</div>
<!-- The Content: Minimized to limit light output -->
<div class="relative z-10 flex flex-col items-center space-y-12 px-6">
<!-- Large Minimal Clock -->
<div class="flex flex-col items-center">
<span class="font-headline text-[120px] md:text-[160px] font-extrabold tracking-tighter text-on-surface/5 leading-none">
                    02:44
                </span>
<span class="font-label text-sm tracking-[0.2em] text-on-surface/10 uppercase mt-4">
                    Deep Sleep Phase
                </span>
</div>
<!-- Focus Element: Muted Secondary Accent -->
<div class="flex items-center gap-3 opacity-20">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">bedtime</span>
<span class="font-body text-sm font-medium text-on-surface">Ocean Waves • 45m remaining</span>
</div>
</div>
<!-- Interactive Instruction: Barely Visible -->
<div class="absolute bottom-16 left-0 w-full flex justify-center z-20">
<p class="font-label text-xs tracking-widest text-on-surface/10 font-medium">
                Tap anywhere to exit
            </p>
</div>
<!-- Hidden Interactive Layer -->
<button aria-label="Exit Sleep Mode" class="absolute inset-0 w-full h-full cursor-none z-50 bg-transparent outline-none focus:outline-none"></button>
</main>
<!-- Content Hidden by Navigation Shell Rules (Transactional/Focused Journey) -->
<!-- Navigation is suppressed per "Relevance Check" and "The Destination Rule" for a full-screen sleep view -->
